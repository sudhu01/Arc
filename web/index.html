<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Arc — Bold athletic gym progress tracker">
  <meta name="theme-color" content="#A4E238">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Arc">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Arc — Gym Tracker</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body { background-color: #F4F5F7; margin: 0; }
    /* Loading splash with the volt mark while Flutter boots. */
    #arc-splash {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; background: #F4F5F7; transition: opacity .3s ease;
    }
    #arc-splash .mark {
      width: 64px; height: 64px; border-radius: 20px; background: #A4E238;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(164,226,56,0.5);
      font: 800 34px/1 -apple-system, "Segoe UI", system-ui, sans-serif;
      color: #092104;
    }
  </style>
</head>
<body>
  <div id="arc-splash"><div class="mark">A</div></div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Fade out the splash once Flutter paints its first frame.
    window.addEventListener('flutter-first-frame', function () {
      var s = document.getElementById('arc-splash');
      if (s) { s.style.opacity = '0'; setTimeout(function () { s.remove(); }, 300); }
    });
  </script>
</body>
</html>
